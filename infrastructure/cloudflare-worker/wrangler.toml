# Donjon License Server — Cloudflare Worker Configuration
#
# SETUP:
#   1. Create a KV namespace:  wrangler kv:namespace create LICENSE_KV
#   2. Replace REPLACE_WITH_KV_NAMESPACE_ID below with the actual namespace ID
#   3. Provision the admin key:  wrangler kv:key put --namespace-id=<ID> admin_api_key <your-key>
#   4. Deploy:  wrangler deploy
#   5. (Optional) Add custom domain via Cloudflare dashboard
#
# STAGING: Override CORS_ALLOW_ORIGIN in [env.staging.vars] for non-prod origins.

name = "donjon-license-server"
main = "src/worker.py"
compatibility_date = "2024-12-01"
compatibility_flags = ["python_workers"]

[vars]
DONJON_VERSION = "7.0"
# CORS origin for the license server API.
# Override this for staging/dev environments.
CORS_ALLOW_ORIGIN = "https://donjonsec.com"

[[kv_namespaces]]
binding = "LICENSE_KV"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

[triggers]
crons = ["0 */6 * * *"]

# Custom domain: license.donjonsec.com
# Configure via Cloudflare dashboard after domain purchase:
# Workers > donjon-license-server > Triggers > Custom Domains > Add: license.donjonsec.com
