# Donjon Platform — Pre-Commit Configuration
repos:
  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-merge-conflict
      - id: detect-private-key
      - id: no-commit-to-branch
        args: ['--branch', 'main']

  # Python linting
  - repo: https://github.com/pycqa/flake8
    rev: 7.1.0
    hooks:
      - id: flake8
        args: ['--max-line-length', '100', '--extend-ignore', 'E203,W503']

  # Security checks
  - repo: https://github.com/pycqa/bandit
    rev: 1.7.9
    hooks:
      - id: bandit
        args: ['-ll', '-ii', '--skip', 'B101,B507,B104,B601']

  # Custom Donjon guards
  - repo: local
    hooks:
      - id: no-bare-input
        name: No bare input() calls
        entry: bash -c 'grep -rnP "(?<!\w)input\s*\(" --include="*.py" lib/ scanners/ utilities/ web/ bin/ | grep -v safe_input | grep -v "# nosec" | grep -v "test_" && echo "ERROR: Use safe_input() instead of bare input()" && exit 1 || true'
        language: system
        always_run: true
        pass_filenames: false

      - id: no-secrets-in-code
        name: No hardcoded secrets
        entry: bash -c 'grep -rnPi "(password|secret|api_key)\s*=\s*[\"'\''][^\"'\'']{8,}" --include="*.py" lib/ scanners/ web/ | grep -v "\.get\(" | grep -v "environ" | grep -v "test_" | grep -v "# nosec" && echo "ERROR: Possible hardcoded secret" && exit 1 || true'
        language: system
        always_run: true
        pass_filenames: false
